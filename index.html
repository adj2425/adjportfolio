<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loading...</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
      pointer-events: none;
      animation: ambientPulse 4s ease-in-out infinite;
    }

    @keyframes ambientPulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.1); }
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      z-index: 1;
    }

    /* ── Spinner ── */
    .spinner-wrap {
      position: relative;
      width: 80px;
      height: 80px;
    }

    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
    }

    .ring-outer {
      border-top-color: #6366f1;
      border-right-color: rgba(99,102,241,0.3);
      animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }

    .ring-mid {
      inset: 10px;
      border-top-color: #818cf8;
      border-left-color: rgba(129,140,248,0.3);
      animation: spin 1.8s cubic-bezier(0.5, 0, 0.5, 1) infinite reverse;
    }

    .ring-inner {
      inset: 22px;
      border-top-color: #a5b4fc;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Centre dot pulse */
    .dot {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      background: #6366f1;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px #6366f1, 0 0 20px rgba(99,102,241,0.5);
      animation: dotPulse 1.5s ease-in-out infinite;
    }

    @keyframes dotPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
      50%       { transform: translate(-50%, -50%) scale(1.5); opacity: 0.6; }
    }

    /* ── Text ── */
    .label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .loading-text {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #94a3b8;
      animation: fadePulse 2s ease-in-out infinite;
    }

    @keyframes fadePulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1;   }
    }

    /* Animated dots */
    .dots span {
      display: inline-block;
      width: 4px;
      height: 4px;
      background: #6366f1;
      border-radius: 50%;
      margin: 0 3px;
      animation: bounce 1.4s ease-in-out infinite both;
    }
    .dots span:nth-child(1) { animation-delay: 0s; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%            { transform: scale(1.2); opacity: 1;   }
    }

    /* ── Divider ── */
    .divider {
      width: 1px;
      height: 32px;
      background: linear-gradient(to bottom, transparent, rgba(99,102,241,0.4), transparent);
    }

    /* ── Link card ── */
    .link-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 18px 32px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 16px;
      text-decoration: none;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(99,102,241,0.08), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .link-card:hover {
      border-color: rgba(99,102,241,0.5);
      background: rgba(99,102,241,0.06);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(99,102,241,0.15), 0 0 0 1px rgba(99,102,241,0.1);
    }

    .link-card:hover::before { opacity: 1; }

    .link-card:active { transform: translateY(0); }

    .link-hint {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #475569;
    }

    .link-name {
      font-size: 15px;
      font-weight: 500;
      color: #c7d2fe;
      letter-spacing: 0.02em;
      transition: color 0.3s ease;
    }

    .link-card:hover .link-name { color: #a5b4fc; }

    /* Arrow icon */
    .arrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(99,102,241,0.15);
      transition: background 0.3s ease, transform 0.3s ease;
    }

    .link-card:hover .arrow {
      background: rgba(99,102,241,0.3);
      transform: translateX(3px);
    }

    .arrow svg {
      width: 10px;
      height: 10px;
      fill: none;
      stroke: #818cf8;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .link-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Progress bar at bottom */
    .progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 2px;
      background: linear-gradient(90deg, #6366f1, #818cf8, #a5b4fc);
      animation: progress 3s ease-in-out infinite;
      box-shadow: 0 0 8px rgba(99,102,241,0.6);
    }

    @keyframes progress {
      0%   { width: 0%;   opacity: 1; }
      70%  { width: 85%;  opacity: 1; }
      90%  { width: 95%;  opacity: 1; }
      100% { width: 100%; opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Spinner -->
    <div class="spinner-wrap">
      <div class="ring ring-outer"></div>
      <div class="ring ring-mid"></div>
      <div class="ring ring-inner"></div>
      <div class="dot"></div>
    </div>

    <!-- Loading label -->
    <div class="label">
      <span class="loading-text">Loading</span>
      <div class="dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Redirect link -->
    <a class="link-card" href="https://abidavidjames.online" target="_blank" rel="noopener noreferrer">
      <span class="link-hint">Visit</span>
      <div class="link-row">
        <span class="link-name">abidavidjames.online</span>
        <span class="arrow">
          <svg viewBox="0 0 12 12">
            <polyline points="2,6 10,6"/>
            <polyline points="6,2 10,6 6,10"/>
          </svg>
        </span>
      </div>
    </a>

  </div>

  <!-- Progress bar -->
  <div class="progress-bar"></div>

</body>
</html>
